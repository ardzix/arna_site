[supervisord]
nodaemon=true
loglevel=info

[program:bootstrap]
; Run one-time startup tasks with clear logs, then keep API worker startup separate.
command=/bin/sh -c "python manage.py migrate_schemas --noinput && python manage.py seed_tenant && python manage.py collectstatic --noinput"
directory=/app
autostart=true
autorestart=false
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:uwsgi]
; Increase buffer sizes to handle large Authorization/Cookie headers
; and prevent "invalid request block size" (502) at reverse proxy.
command=/bin/sh -c "uwsgi --http :8001 --module config.wsgi:application --master --processes 4 --threads 2 --buffer-size 65535 --http-buffer-size 65535 --harakiri 60 --max-requests 1000"
directory=/app
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:qcluster]
command=python manage.py qcluster
directory=/app
autostart=true
autorestart=true
priority=30
startsecs=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
